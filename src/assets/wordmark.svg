<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -10 96 38" role="img" aria-label="hal0">
  <style>
    .w { font: 700 22px 'JetBrains Mono', ui-monospace, Menlo, monospace; letter-spacing: -0.02em; fill: var(--hal0-fg, var(--sl-color-text, #f5f5f5)); font-feature-settings: 'zero' 1; }
    .z { fill: #ffb000; }
    .halo { fill: none; stroke: #ffb000; stroke-width: 1.6; }
  </style>
  <!-- companion mark: flattened ellipse halo, ~8:1 aspect, tilted -4°,
       centered over the wordmark. Sized narrower than the wordmark
       so it reads as a halo *over* the type, not a frame around it. -->
  <ellipse class="halo" cx="35" cy="-3" rx="28" ry="2.5"
           transform="rotate(-4 35 -3)"
           vector-effect="non-scaling-stroke" />
  <text x="0" y="21" class="w">hal</text>
  <text x="56" y="21" class="w z">0</text>
</svg>
